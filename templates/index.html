<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arschloch</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root{--bg:#0f0f0f;--surface:#1a1a1a;--border:#2a2a2a;--accent:#c8a84b;--accent2:#e8c87a;--text:#e8e0d0;--muted:#666;--red:#c0392b;--green:#27ae60}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}
header{width:100%;padding:1.2rem 2rem;border-bottom:1px solid var(--border);display:flex;align-items:baseline;gap:1rem}
header h1{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.05em;color:var(--accent)}
header span{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted)}
header nav{margin-left:auto;display:flex;gap:.5rem}
main{width:100%;max-width:960px;padding:1.5rem 1rem;flex:1}
.screen{display:none}.screen.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1.5rem}
.card h2{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.05em;color:var(--accent);margin-bottom:1rem}
label{display:block;font-size:.72rem;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;margin:.8rem 0 .3rem}
input[type=text]{width:100%;background:#111;border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'DM Mono',monospace;font-size:.95rem;padding:.55rem .75rem;outline:none;transition:border-color .2s}
input[type=text]:focus{border-color:var(--accent)}
.btn{display:inline-block;background:var(--accent);color:#111;font-family:'Inter',sans-serif;font-weight:600;font-size:.82rem;padding:.6rem 1.2rem;border:none;border-radius:4px;cursor:pointer;transition:background .15s;margin-top:.8rem}
.btn:hover{background:var(--accent2)}
.btn.sec{background:transparent;border:1px solid var(--border);color:var(--text);margin-top:.8rem}
.btn.sec:hover{border-color:var(--accent);color:var(--accent)}
.btn-row{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:.8rem}
.err{color:var(--red);font-size:.8rem;margin-top:.4rem;min-height:1rem}
/* lobby */
.slot-grid{display:flex;flex-direction:column;gap:.5rem;margin-top:.8rem}
.slot{display:flex;align-items:center;gap:.75rem;padding:.6rem .8rem;background:#111;border:1px solid var(--border);border-radius:6px;font-size:.85rem}
.slot .pip{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
.slot.empty .pip{background:var(--border)}.slot.empty{color:var(--muted)}
.slot.bot{color:var(--accent)}
.slot .tag{font-size:.65rem;font-family:'DM Mono',monospace;background:var(--border);padding:.1rem .35rem;border-radius:3px;margin-left:auto}
.slot .rm{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:.8rem;margin-left:.5rem;padding:.1rem .3rem}
.slot .rm:hover{color:var(--red)}
#lobby-code{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:.2em;color:var(--accent);text-align:center;padding:.8rem 0}
.lobby-sub{text-align:center;font-size:.72rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
/* game */
#game-screen.active{display:grid;grid-template-columns:1fr 270px;gap:1.2rem}
.game-main{display:flex;flex-direction:column;gap:.9rem}
#round-banner{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted);text-align:center;padding:.3rem;letter-spacing:.08em}
#opponents{display:flex;flex-wrap:wrap;gap:.5rem}
.opp{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:.5rem .75rem;font-size:.78rem;min-width:100px}
.opp .oname{font-weight:600}
.opp .oinfo{font-size:.68rem;color:var(--muted);margin-top:.15rem}
.opp .orank{font-size:.65rem;color:var(--accent);font-family:'DM Mono',monospace;margin-top:.1rem}
.opp.cur{border-color:var(--accent)}
.bot-thinking{font-size:.68rem;color:var(--accent);font-family:'DM Mono',monospace;margin-top:.2rem;animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#pile-area{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem;min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.4rem}
#pile-label{font-size:.68rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
#pile-cards{display:flex;gap:.3rem;flex-wrap:wrap;justify-content:center}
.cc{background:#fff;color:#111;border-radius:4px;padding:.25rem .45rem;font-family:'DM Mono',monospace;font-size:.82rem;font-weight:500;min-width:32px;text-align:center}
.cc.red{color:var(--red)}
#turn-banner{font-size:.8rem;color:var(--muted);text-align:center}
#turn-banner span{color:var(--accent);font-weight:600}
#bot-move-banner{background:#1a1a12;border:1px solid var(--accent);border-radius:6px;padding:.5rem .8rem;font-family:'DM Mono',monospace;font-size:.8rem;color:var(--accent);display:none;text-align:center;margin-top:.3rem}
#hand-area{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem}
.hand-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.7rem}
.hand-header h3{font-size:.7rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin:0}
.sort-btn{background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--muted);font-size:.72rem;padding:.25rem .5rem;cursor:pointer;font-family:'DM Mono',monospace}
.sort-btn:hover{border-color:var(--accent);color:var(--accent)}
#hand-cards{display:flex;flex-wrap:wrap;gap:.35rem}
#moves-area{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem}
#moves-area h3{font-size:.7rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.7rem}
#move-buttons{display:flex;flex-wrap:wrap;gap:.4rem}
.mv{background:#111;border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:'DM Mono',monospace;font-size:.88rem;padding:.45rem .9rem;cursor:pointer;transition:border-color .15s,background .15s}
.mv:hover{border-color:var(--accent);background:#1e1a12;color:var(--accent)}
.mv.pass{border-color:var(--muted);color:var(--muted)}
.mv.pass:hover{border-color:var(--red);color:var(--red);background:#1a1010}
#wait-msg{color:var(--muted);font-size:.82rem;font-style:italic}
/* trading */
#trade-area{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem}
#trade-area h3{font-size:.7rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.7rem}
#trade-info{font-size:.82rem;color:var(--text);margin-bottom:.7rem;line-height:1.6}
#trade-cards{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:.7rem}
.tc{background:#111;border:2px solid var(--border);border-radius:4px;padding:.25rem .45rem;font-family:'DM Mono',monospace;font-size:.82rem;cursor:pointer;transition:border-color .15s}
.tc.red{color:var(--red)}
.tc.selected{border-color:var(--accent);background:#1e1a12}
/* sidebar */
.game-sidebar{display:flex;flex-direction:column;gap:.9rem}
#log-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem;flex:1}
#log-box h3{font-size:.7rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.5rem}
#log-entries{font-family:'DM Mono',monospace;font-size:.72rem;line-height:1.7;color:var(--muted);max-height:280px;overflow-y:auto}
#log-entries p{border-bottom:1px solid #1a1a1a;padding:.1rem 0}
#log-entries p:last-child{color:var(--text)}
#bot-panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.8rem}
#bot-panel h3{font-size:.7rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.5rem}
/* finished */
#fin-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;align-items:center;justify-content:center}
#fin-overlay.active{display:flex}
#fin-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:2rem;max-width:380px;width:90%;text-align:center}
#fin-box h2{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--accent);margin-bottom:1rem}
.rank-row{display:flex;justify-content:space-between;align-items:center;padding:.4rem 0;border-bottom:1px solid var(--border);font-size:.88rem}
.rank-row:last-child{border-bottom:none}
.rank-lbl{font-family:'DM Mono',monospace;color:var(--accent);font-size:.75rem}
/* log viewer */
#logs-screen .card{max-width:700px;margin:0 auto}
#log-output{font-family:'DM Mono',monospace;font-size:.75rem;line-height:1.8;color:var(--muted);max-height:60vh;overflow-y:auto;margin-top:.8rem;border-top:1px solid var(--border);padding-top:.8rem}
.game-entry{margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.game-entry h4{color:var(--accent);font-size:.8rem;margin-bottom:.4rem}
.move-line{padding:.1rem 0;border-bottom:1px solid #1a1a1a}
.move-line:last-child{border:none}
@media(max-width:640px){#game-screen.active{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <h1>Arschloch</h1>
  <span>Kartenspiel</span>
  <nav>
    <button class="btn sec" style="margin-top:0;font-size:.75rem" onclick="showScreen('logs-screen')">📋 Logs</button>
    <button class="btn sec" style="margin-top:0;font-size:.75rem" onclick="showScreen('home-screen')">🏠 Home</button>
  </nav>
</header>
<main>

<!-- HOME -->
<div id="home-screen" class="screen active">
  <div class="card" style="max-width:400px;margin:0 auto">
    <h2>Spielen</h2>
    <label>Dein Name</label>
    <input type="text" id="player-name" placeholder="Name eingeben" maxlength="20">
    <div id="home-err" class="err"></div>
    <div class="btn-row">
      <button class="btn" onclick="createLobby()">Spiel erstellen</button>
      <button class="btn sec" onclick="showJoin()">Beitreten</button>
    </div>
    <div id="join-sec" style="display:none">
      <label>Raum-Code</label>
      <input type="text" id="join-code" placeholder="ABC123" maxlength="6" style="text-transform:uppercase;letter-spacing:.15em">
      <div class="btn-row"><button class="btn" onclick="joinLobby()">Beitreten</button></div>
    </div>
  </div>
</div>

<!-- LOBBY -->
<div id="lobby-screen" class="screen">
  <div class="card" style="max-width:460px;margin:0 auto">
    <div class="lobby-sub">Raum-Code</div>
    <div id="lobby-code">——————</div>
    <p style="text-align:center;font-size:.78rem;color:var(--muted);margin-bottom:1.2rem">Teile diesen Code mit anderen Spielern</p>
    <h2>Spieler (5)</h2>
    <div class="slot-grid" id="slot-grid"></div>
    <div id="lobby-status" style="font-size:.78rem;color:var(--muted);text-align:center;margin-top:.6rem"></div>
    <div class="btn-row">
      <button class="btn" id="add-bot-btn" onclick="addBot()" style="display:none">+ Bot hinzufügen</button>
      <button class="btn" id="start-btn" onclick="startGame()" style="display:none">Spiel starten</button>
    </div>
  </div>
</div>

<!-- GAME -->
<div id="game-screen" class="screen">
  <div class="game-main">
    <div id="round-banner">Runde 1</div>
    <div id="opponents"></div>
    <div id="pile-area">
      <div id="pile-label">Stapel</div>
      <div id="pile-cards"><span style="color:var(--muted);font-size:.8rem">Leer</span></div>
      <div id="turn-banner"></div>
      <div id="bot-move-banner"></div>
    </div>
    <div id="hand-area">
      <div class="hand-header">
        <h3>Deine Hand</h3>
        <button class="sort-btn" onclick="toggleSort()">⇅ <span id="sort-lbl">sortiert</span></button>
      </div>
      <div id="hand-cards"></div>
    </div>
    <div id="moves-area">
      <h3>Mögliche Züge</h3>
      <div id="move-buttons"></div>
    </div>
    <div id="trade-area" style="display:none">
      <h3>Trading</h3>
      <div id="trade-info"></div>
      <div id="trade-cards"></div>
      <button class="btn" onclick="submitTrade()">Tauschen bestätigen</button>
      <div id="trade-err" class="err"></div>
    </div>
  </div>
  <div class="game-sidebar">
    <div id="log-box">
      <h3>Spielverlauf</h3>
      <div id="log-entries"></div>
    </div>
    <div id="bot-panel" style="display:none">
      <h3>Bots</h3>
      <button class="btn sec" style="margin-top:.3rem;font-size:.75rem;width:100%" onclick="addBotMidgame()">+ Bot hinzufügen</button>
    </div>
  </div>
</div>

<!-- LOGS -->
<div id="logs-screen" class="screen">
  <div class="card">
    <h2>Spielverlauf-Archiv</h2>
    <label>Passwort</label>
    <input type="text" id="log-pw" placeholder="Passwort eingeben">
    <div class="btn-row"><button class="btn" onclick="fetchLogs()">Laden</button></div>
    <div id="log-err" class="err"></div>
    <div id="log-output"></div>
  </div>
</div>

</main>

<!-- FINISHED OVERLAY -->
<div id="fin-overlay">
  <div id="fin-box">
    <h2>Runde beendet!</h2>
    <div id="fin-ranks"></div>
    <div class="btn-row" style="justify-content:center;margin-top:1.2rem">
      <button class="btn" id="next-round-btn" onclick="nextRound()" style="display:none">Nächste Runde →</button>
      <button class="btn sec" onclick="location.reload()">Beenden</button>
    </div>
  </div>
</div>

<script>
let gameId=null,playerId=null,myEntityID=null,isHost=false;
let poll=null,sortEnabled=true,lastHand=[],selectedTrade=[],lastStatus=null;
let botPollFast=false;

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
async function api(path,method='GET',body=null){
  const o={method,headers:{'Content-Type':'application/json'}};
  if(body) o.body=JSON.stringify(body);
  const r=await fetch(path,o); return r.json();
}
function suitRed(c){return c.includes('♥')||c.includes('♦')}
function cc(c){return `<span class="cc${suitRed(c)?' red':''}">${c}</span>`}
function cardVal(c){
  const R={"2":0,"3":4,"4":8,"5":12,"6":16,"7":20,"8":24,"9":28,"T":32,"J":36,"Q":40,"K":44,"A":48};
  const S={"♣":0,"♦":1,"♥":2,"♠":3};
  return (R[c[0]]??0)+(S[c[1]]??0);
}
function renderHand(hand){
  lastHand=hand;
  const d=document.getElementById('hand-cards');
  if(!hand||!hand.length){d.innerHTML='<span style="color:var(--muted);font-size:.8rem">Keine Karten</span>';return}
  const display=sortEnabled?[...hand].sort((a,b)=>cardVal(a)-cardVal(b)):hand;
  d.innerHTML=display.map(c=>`<span class="cc${suitRed(c)?' red':''}">${c}</span>`).join('');
}
function toggleSort(){
  sortEnabled=!sortEnabled;
  document.getElementById('sort-lbl').textContent=sortEnabled?'sortiert':'original';
  renderHand(lastHand);
}

// HOME
function showJoin(){document.getElementById('join-sec').style.display='block'}
async function createLobby(){
  const name=document.getElementById('player-name').value.trim();
  if(!name){document.getElementById('home-err').textContent='Name eingeben.';return}
  const d=await api('/api/lobby/create','POST',{name});
  if(d.error){document.getElementById('home-err').textContent=d.error;return}
  gameId=d.game_id;playerId=d.player_id;isHost=true;enterLobby();
}
async function joinLobby(){
  const name=document.getElementById('player-name').value.trim();
  const code=document.getElementById('join-code').value.trim().toUpperCase();
  if(!name||!code){document.getElementById('home-err').textContent='Name und Code eingeben.';return}
  const d=await api('/api/lobby/join','POST',{name,game_id:code});
  if(d.error){document.getElementById('home-err').textContent=d.error;return}
  gameId=d.game_id;playerId=d.player_id;isHost=false;enterLobby();
}

// LOBBY
function enterLobby(){
  document.getElementById('lobby-code').textContent=gameId;
  showScreen('lobby-screen');
  if(isHost){
    document.getElementById('add-bot-btn').style.display='inline-block';
    document.getElementById('start-btn').style.display='inline-block';
  }
  poll=setInterval(pollLobby,2000);pollLobby();
}
async function pollLobby(){
  const d=await api(`/api/lobby/${gameId}`);
  if(d.status==='playing'||d.status==='trading'){clearInterval(poll);enterGame();return}
  const grid=document.getElementById('slot-grid');
  grid.innerHTML='';
  let humans=0,bots=0,empty=0;
  d.players.forEach((p,i)=>{
    const div=document.createElement('div');
    if(!p){empty++;div.className='slot empty';div.innerHTML=`<span class="pip"></span><span>Platz ${i+1} – leer</span>`;}
    else if(p.isBot){bots++;div.className='slot bot';
      div.innerHTML=`<span class="pip" style="background:var(--accent)"></span><span>${p.name}</span><span class="tag">BOT</span>`
        +(isHost&&i>0?`<button class="rm" onclick="removeBot(${i})">✕</button>`:'');}
    else{humans++;div.className='slot';
      div.innerHTML=`<span class="pip"></span><span>${p.name}${i===0?' <span style="color:var(--muted);font-size:.68rem">(Host)</span>':''}</span>`;}
    grid.appendChild(div);
  });
  document.getElementById('lobby-status').textContent=`${humans} Mensch(en) · ${bots} Bot(s) · ${empty} leer`;
  document.getElementById('add-bot-btn').style.display=(isHost&&empty>0)?'inline-block':'none';
}
async function addBot(){
  const d=await api(`/api/lobby/${gameId}/bot`,'POST',{player_id:playerId});
  if(d.error)alert(d.error);else pollLobby();
}
async function removeBot(idx){
  await api(`/api/lobby/${gameId}/remove_bot`,'POST',{player_id:playerId,slot:idx});
  pollLobby();
}
async function startGame(){
  const d=await api(`/api/lobby/${gameId}/start`,'POST',{player_id:playerId});
  if(d.error){alert(d.error);return}
  clearInterval(poll);enterGame();
}

// GAME
function enterGame(){
  showScreen('game-screen');
  if(isHost)document.getElementById('bot-panel').style.display='block';
  schedulePoll();pollGame();
}

function schedulePoll(){
  clearInterval(poll);
  // Poll every 1s when bots are active, 2s otherwise
  poll=setInterval(pollGame, botPollFast ? 900 : 2000);
}

async function pollGame(){
  const d=await api(`/api/game/${gameId}/state?player_id=${playerId}`);
  if(!d||d.error)return;
  myEntityID=d.myEntityID;

  // Adjust poll speed based on whether next move is a bot
  const wasFast=botPollFast;
  botPollFast = d.nextIsBot && !d.finished;
  if(wasFast!==botPollFast) schedulePoll();

  renderGame(d);
  if(d.finished && lastStatus!=='finished'){lastStatus='finished';showFinished(d.players,d.roundNumber);}
  if(d.status==='trading' && lastStatus!=='trading'){lastStatus='trading';}
  lastStatus=d.status;
}

function renderGame(d){
  document.getElementById('round-banner').textContent=`Runde ${d.roundNumber||1}`;

  // Opponents – highlight active bot
  const oDiv=document.getElementById('opponents');
  oDiv.innerHTML='';
  d.players.forEach(p=>{
    if(p.entityID===myEntityID)return;
    const isActive=p.entityID===d.currentTurn && d.status==='playing';
    const el=document.createElement('div');
    el.className='opp'+(isActive?' cur':'');
    // Show animated indicator if bot is currently playing
    const botIndicator = (isActive && p.isBot)
      ? `<div class="bot-thinking">⚙ spielt…</div>`
      : '';
    el.innerHTML=`<div class="oname">${p.name}${p.isBot?' 🤖':''}</div>
      <div class="oinfo">🃏 ${p.cardCount} Karten</div>
      ${p.rank?`<div class="orank">${p.rank}</div>`:''}
      ${p.prevRank&&!p.rank?`<div class="oinfo">zuletzt: ${p.prevRank}</div>`:''}
      ${botIndicator}`;
    oDiv.appendChild(el);
  });

  // Pile
  const pile=document.getElementById('pile-cards');
  pile.innerHTML=d.stack&&d.stack.length?d.stack.map(cc).join('')
    :'<span style="color:var(--muted);font-size:.8rem">Leer</span>';

  // Bot move banner
  const bmb=document.getElementById('bot-move-banner');
  if(d.lastBotMove && d.status==='playing'){
    const bm=d.lastBotMove;
    if(bm.move==='pass'){
      bmb.style.display='block';
      bmb.textContent=`🤖 ${bm.name} hat gepasst`;
    } else {
      bmb.style.display='block';
      bmb.innerHTML=`🤖 ${bm.name} legte: ${bm.cards ? bm.cards.map(cc).join('') : bm.move}`;
    }
    // Fade out after 3s if it's now human's turn
    if(!d.nextIsBot){
      setTimeout(()=>{bmb.style.display='none';},3000);
    }
  } else if(!d.nextIsBot){
    bmb.style.display='none';
  }

  // Turn banner
  const tb=document.getElementById('turn-banner');
  if(d.status==='trading'){tb.innerHTML='<span>Trading-Phase</span>';}
  else if(d.currentTurn===myEntityID){tb.innerHTML='<span>Du bist dran!</span>';}
  else{
    const cur=d.players.find(p=>p.entityID===d.currentTurn);
    const isBot=cur&&cur.isBot;
    tb.innerHTML=isBot
      ? `<span style="color:var(--accent)">🤖 ${cur?cur.name:'?'} denkt…</span>`
      : `Zug von <span>${cur?cur.name:'?'}</span>`;
  }

  // Hand
  const me=d.players.find(p=>p.entityID===myEntityID);
  renderHand(me?me.hand:[]);

  // Moves / Trade
  const movesArea=document.getElementById('moves-area');
  const tradeArea=document.getElementById('trade-area');
  if(d.status==='trading'){
    movesArea.style.display='none';
    if(d.myTrade&&!d.myTrade.done){
      tradeArea.style.display='block';
      renderTrade(d.myTrade,me?me.hand:[],d.players);
    } else {
      tradeArea.style.display='none';
      movesArea.style.display='block';
      document.getElementById('move-buttons').innerHTML='<span id="wait-msg">Warte auf Trading der anderen…</span>';
    }
  } else {
    tradeArea.style.display='none';
    movesArea.style.display='block';
    const mb=document.getElementById('move-buttons');mb.innerHTML='';
    if(d.currentTurn===myEntityID&&d.myMoves&&d.myMoves.length){
      d.myMoves.forEach(mv=>{
        const b=document.createElement('button');
        b.className='mv'+(mv==='pass'?' pass':'');
        b.textContent=mv==='pass'?'Passen':mv;
        b.onclick=()=>makeMove(mv);
        mb.appendChild(b);
      });
    } else if(d.nextIsBot){
      mb.innerHTML='<span id="wait-msg">🤖 Bots spielen…</span>';
    } else {
      mb.innerHTML='<span id="wait-msg">Warte auf anderen Spieler…</span>';
    }
  }

  // Log
  const le=document.getElementById('log-entries');
  le.innerHTML=d.log.map(l=>`<p>${l}</p>`).join('');
  le.scrollTop=le.scrollHeight;
}

function renderTrade(trade,hand,players){
  const target=players.find(p=>p.entityID===trade.to);
  const dir=trade.direction==='give_best'?'beste':'schlechteste';
  document.getElementById('trade-info').innerHTML=
    `Gib deine ${trade.count} ${dir} Karte(n) an <b>${target?target.name:'?'}</b>.`;
  const tc=document.getElementById('trade-cards');tc.innerHTML='';
  selectedTrade=[];
  const display=sortEnabled?[...hand].sort((a,b)=>cardVal(a)-cardVal(b)):hand;
  display.forEach(c=>{
    const el=document.createElement('span');
    el.className='tc'+(suitRed(c)?' red':'');
    el.textContent=c;
    el.onclick=()=>{
      if(selectedTrade.includes(c)){selectedTrade=selectedTrade.filter(x=>x!==c);el.classList.remove('selected');}
      else if(selectedTrade.length<trade.count){selectedTrade.push(c);el.classList.add('selected');}
    };
    tc.appendChild(el);
  });
}

async function makeMove(move){
  const d=await api(`/api/game/${gameId}/move`,'POST',{player_id:playerId,move});
  if(d.error){alert(d.error);return}
  await pollGame();
}
async function submitTrade(){
  if(!selectedTrade.length){document.getElementById('trade-err').textContent='Keine Karte ausgewählt.';return}
  const d=await api(`/api/game/${gameId}/trade`,'POST',{player_id:playerId,cards:selectedTrade});
  if(d.error){document.getElementById('trade-err').textContent=d.error;return}
  document.getElementById('trade-err').textContent='';
  selectedTrade=[];await pollGame();
}

// FINISHED
function showFinished(players,roundNum){
  const order=["President","Vice-President","Citizen","Vice-Brokie","Brokie"];
  const ranked=players.filter(p=>p.rank).sort((a,b)=>order.indexOf(a.rank)-order.indexOf(b.rank));
  document.getElementById('fin-ranks').innerHTML=ranked.map(p=>
    `<div class="rank-row"><span>${p.name}${p.isBot?' 🤖':''}</span><span class="rank-lbl">${p.rank}</span></div>`
  ).join('');
  if(isHost)document.getElementById('next-round-btn').style.display='inline-block';
  document.getElementById('fin-overlay').classList.add('active');
}
async function nextRound(){
  const d=await api(`/api/game/${gameId}/next_round`,'POST',{player_id:playerId});
  if(d.error){alert(d.error);return}
  document.getElementById('fin-overlay').classList.remove('active');
  lastStatus=null;botPollFast=false;schedulePoll();await pollGame();
}

// LOGS
async function fetchLogs(){
  const pw=document.getElementById('log-pw').value.trim();
  const d=await api(`/api/logs?password=${encodeURIComponent(pw)}`);
  if(d.error){document.getElementById('log-err').textContent=d.error;return}
  document.getElementById('log-err').textContent='';
  const out=document.getElementById('log-output');
  if(!d.logs.length){out.innerHTML='<p style="color:var(--muted)">Keine Einträge.</p>';return}
  out.innerHTML=[...d.logs].reverse().map(rec=>{
    const moves=rec.moves.map(m=>
      `<div class="move-line">R${m.round} T${m.trick} P${m.p}(${m.name}): ${m.move}${m.auto?' [auto]':''}</div>`
    ).join('');
    const plist=rec.players.map(p=>`${p.name}${p.bot?'🤖':''}→${p.rank||'?'}`).join(' | ');
    return `<div class="game-entry">
      <h4>${rec.ts.slice(0,19).replace('T',' ')} · Runde ${rec.round} · Spiel ${rec.game_id}</h4>
      <div style="color:var(--text);margin-bottom:.3rem;font-size:.72rem">${plist}</div>
      ${moves}</div>`;
  }).join('');
}
</script>
